name: python-api

on:
  push:
    branches: [main]
    paths:
      - 'services/python-api/**'
      - '.github/workflows/python-api.yml'
  pull_request:
    paths:
      - 'services/python-api/**'

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/python-api

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/python-api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: services/python-api/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: services/python-api
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
